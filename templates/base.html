<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Legal Dashboard{% endblock %}</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="container navbar-content">
            <!-- Brand Logo and Title -->
            <a class="navbar-brand" href="/">
                <i class="fas fa-balance-scale"></i>
                <span class="navbar-brand-title">Legal Dashboard</span>
            </a>
            <!-- Navigation Links -->
            <div class="nav-links">
                <a href="/" class="nav-link {% if active_page == 'home' %}active{% endif %}">Home</a>
                <a href="/stats" class="nav-link {% if active_page == 'stats' %}active{% endif %}">Stats</a>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main>
        <div class="container">
            {% block content %}{% endblock %}
        </div>
    </main>

</body>
</html>
