{% extends "base.html" %}

{% block title %}{{ law_name }} - Select Year{% endblock %}

{% block content %}
<div class="page-header">
    <h1>{{ law_name }}</h1>
    <p>Please select a year to view the act details.</p>
</div>

<!-- Year Cards Section -->
<div class="year-grid">
    {% for year in years %}
    <a href="/acts/{{ law_type }}/{{ law_name }}/{{ year }}" class="year-card-link">
        <div class="year-card">
            {{ year }}
        </div>
    </a>
    {% endfor %}
</div>
{% endblock %}
